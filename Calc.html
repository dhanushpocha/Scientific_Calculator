<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scientific Calculator</title>

<style>
    body {
        background: #222;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: Arial;
    }

    .calculator {
        background: #333;
        padding: 20px;
        border-radius: 10px;
    }

    #display {
        width: 100%;
        height: 60px;
        font-size: 24px;
        text-align: right;
        margin-bottom: 10px;
        padding: 10px;
        border-radius: 5px;
        border: none;
    }

    .buttons {
        display: grid;
        grid-template-columns: repeat(5, 60px);
        gap: 10px;
    }

    button {
        padding: 15px;
        font-size: 16px;
        background: #555;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }

    button:hover {
        background: #777;
    }

    .equal { background: green; }
    .clear { background: red; }
</style>
</head>

<body>

<div class="calculator">
    <input type="text" id="display" disabled>

    <div class="buttons">
        <button class="clear" onclick="clearDisplay()">C</button>
        <button onclick="append('%')">%</button>
        <button onclick="append('(')">(</button>
        <button onclick="append(')')">)</button>
        <button onclick="append('/')">/</button>

        <button onclick="append('7')">7</button>
        <button onclick="append('8')">8</button>
        <button onclick="append('9')">9</button>
        <button onclick="append('*')">*</button>
        <button onclick="sqrt()">√</button>

        <button onclick="append('4')">4</button>
        <button onclick="append('5')">5</button>
        <button onclick="append('6')">6</button>
        <button onclick="append('-')">-</button>
        <button onclick="power()">x²</button>

        <button onclick="append('1')">1</button>
        <button onclick="append('2')">2</button>
        <button onclick="append('3')">3</button>
        <button onclick="append('+')">+</button>
        <button onclick="sin()">sin</button>

        <button onclick="append('0')">0</button>
        <button onclick="append('.')">.</button>
        <button onclick="log()">log</button>
        <button onclick="cos()">cos</button>
        <button onclick="tan()">tan</button>

        <button class="equal" onclick="calculate()" style="grid-column: span 5;">=</button>
    </div>
</div>

<script>
let display = document.getElementById("display");

function append(value) {
    display.value += value;
}

function clearDisplay() {
    display.value = "";
}

function calculate() {
    try {
        display.value = eval(display.value);
    } catch {
        display.value = "Error";
    }
}

// ✅ Convert degrees → radians
function toRadians(deg) {
    return deg * (Math.PI / 180);
}

// ✅ Safe value extraction
function getValue() {
    if (display.value === "") {
        alert("Enter a value first!");
        return null;
    }
    return Number(eval(display.value));
}

// ✅ Scientific functions (FIXED)
function sin() {
    let val = getValue();
    if (val !== null)
        display.value = Math.sin(toRadians(val)).toFixed(4);
}

function cos() {
    let val = getValue();
    if (val !== null)
        display.value = Math.cos(toRadians(val)).toFixed(4);
}

function tan() {
    let val = getValue();
    if (val !== null)
        display.value = Math.tan(toRadians(val)).toFixed(4);
}

function sqrt() {
    let val = getValue();
    if (val !== null)
        display.value = Math.sqrt(val).toFixed(4);
}

function power() {
    let val = getValue();
    if (val !== null)
        display.value = Math.pow(val, 2).toFixed(4);
}

function log() {
    let val = getValue();
    if (val !== null)
        display.value = Math.log10(val).toFixed(4);
}
</script>

</body>
</html>
